<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBC Status</title>
    <link rel="icon" type="image/png" href="/icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-gray-800 font-sans p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">HBC Status</h1>
                <p class="text-sm text-gray-500 mt-1">Real-time status of API endpoints</p>
            </div>
            <button id="refreshBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow-sm transition duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                <span class="hidden sm:inline">Refresh</span>
            </button>
        </div>

        <div id="windowFilter" class="flex items-center gap-2 mb-4">
            <span class="text-xs text-gray-400 uppercase tracking-wider mr-1">History:</span>
            <button data-hours="1" class="window-btn px-3 py-1 text-xs font-medium rounded-full border border-gray-200 hover:bg-gray-50">1h</button>
            <button data-hours="3" class="window-btn px-3 py-1 text-xs font-medium rounded-full border border-gray-200 hover:bg-gray-50">3h</button>
            <button data-hours="7" class="window-btn px-3 py-1 text-xs font-medium rounded-full border border-gray-200 hover:bg-gray-50">7h</button>
        </div>

        <div id="loading" class="flex justify-center items-center py-16">
            <div class="spinner"></div>
        </div>

        <div id="error" class="hidden bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded shadow-sm" role="alert">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-red-700" id="errorMessage"></p>
                </div>
            </div>
        </div>

        <div id="statusList" class="flex flex-col gap-3 hidden">
            <!-- Items will be injected here -->
        </div>
    </div>

    <!-- Logs modal -->
    <div id="logsModal" class="fixed inset-0 z-50 hidden">
        <div id="modalBackdrop" class="absolute inset-0 bg-black/50"></div>
        <div class="relative max-w-3xl mx-auto mt-10 mb-10 bg-white rounded-xl shadow-xl flex flex-col max-h-[85vh]">
            <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
                <div class="min-w-0">
                    <h3 id="modalTitle" class="text-base font-semibold text-gray-900 truncate">Logs</h3>
                    <p id="modalSubtitle" class="text-xs text-gray-500 mt-0.5 truncate">Activity log</p>
                </div>
                <button id="modalClose" class="text-gray-400 hover:text-gray-600 p-1 rounded" aria-label="Close">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="px-5 py-3 border-b border-gray-100 flex flex-wrap gap-2" id="filterBar">
                <button data-range="24h"  class="filter-btn px-3 py-1 text-xs font-medium rounded-full border border-gray-200 hover:bg-gray-50">24h</button>
                <button data-range="7"     class="filter-btn px-3 py-1 text-xs font-medium rounded-full border border-gray-200 hover:bg-gray-50">7 days</button>
                <button data-range="14"    class="filter-btn px-3 py-1 text-xs font-medium rounded-full border border-gray-200 hover:bg-gray-50">14 days</button>
                <button data-range="30"    class="filter-btn px-3 py-1 text-xs font-medium rounded-full border border-gray-200 hover:bg-gray-50">30 days</button>
            </div>

            <div id="modalStats" class="px-5 py-3 border-b border-gray-100 grid grid-cols-2 sm:grid-cols-4 gap-3 text-xs"></div>

            <div id="modalChartWrap" class="px-5 py-3 border-b border-gray-100 hidden">
                <div class="flex items-center justify-between text-[10px] text-gray-400 uppercase tracking-wider mb-1.5">
                    <span>History</span>
                    <span id="modalChartMeta"></span>
                </div>
                <div id="modalChart" class="flex items-end gap-px h-6 w-full"></div>
            </div>

            <div class="flex-1 overflow-y-auto px-5 py-3">
                <div id="modalLoading" class="flex justify-center py-10 hidden">
                    <div class="spinner"></div>
                </div>
                <div id="modalEmpty" class="text-center text-sm text-gray-400 py-10 hidden">No logs in this range.</div>
                <table id="modalTable" class="w-full text-xs hidden">
                    <thead class="text-gray-500">
                        <tr class="text-left">
                            <th class="py-1.5 pr-2 font-medium">Time</th>
                            <th class="py-1.5 pr-2 font-medium">Status</th>
                            <th class="py-1.5 pr-2 font-medium">Latency</th>
                            <th class="py-1.5 font-medium">Detail</th>
                        </tr>
                    </thead>
                    <tbody id="modalTbody"></tbody>
                </table>
                <p id="modalFooterNote" class="text-[11px] text-gray-400 mt-3 hidden"></p>
            </div>
        </div>
    </div>

    <script>
        const statusList = document.getElementById('statusList');
        const loading = document.getElementById('loading');
        const errorContainer = document.getElementById('error');
        const errorMessage = document.getElementById('errorMessage');
        const refreshBtn = document.getElementById('refreshBtn');
        const windowFilter = document.getElementById('windowFilter');

        let refreshInterval;
        let countdownInterval;
        let intervalSec = 30;
        let timeLeft = intervalSec;
        let currentWindowHours = 1;

        const setActiveWindow = (hours) => {
            windowFilter.querySelectorAll('.window-btn').forEach(btn => {
                const active = parseInt(btn.dataset.hours, 10) === hours;
                btn.classList.toggle('bg-blue-600', active);
                btn.classList.toggle('text-white', active);
                btn.classList.toggle('border-blue-600', active);
                btn.classList.toggle('text-gray-600', !active);
            });
        };
        setActiveWindow(currentWindowHours);

        const updateBtnText = () => {
            refreshBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                <span class="hidden sm:inline">Refresh (${timeLeft}s)</span>
            `;
        };

        const resetTimer = () => {
            clearInterval(countdownInterval);
            timeLeft = intervalSec;
            updateBtnText();
            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) timeLeft = 0;
                updateBtnText();
            }, 1000);
        };

        // Group a chronological history (ASC) into at most `bars` buckets.
        // A bucket renders red if ANY check inside failed.
        const bucketHistory = (history, bars) => {
            const n = history.length;
            if (n === 0) return [];
            const size = Math.max(1, Math.ceil(n / bars));
            const out = [];
            for (let i = 0; i < n; i += size) {
                const chunk = history.slice(i, i + size);
                const errors = chunk.filter(h => h.status !== 'ok').length;
                const hasError = errors > 0;
                const firstTs = new Date(chunk[0].timestamp);
                const lastTs  = new Date(chunk[chunk.length - 1].timestamp);
                let tooltip;
                if (chunk.length === 1) {
                    tooltip = `${firstTs.toLocaleTimeString()} • ${chunk[0].time} • ${chunk[0].status.toUpperCase()}`;
                } else {
                    const range = `${firstTs.toLocaleTimeString()}–${lastTs.toLocaleTimeString()}`;
                    tooltip = hasError
                        ? `${range} • ${chunk.length} checks • ${errors} error${errors === 1 ? '' : 's'}`
                        : `${range} • ${chunk.length} checks • all OK`;
                }
                out.push({ hasError, tooltip });
            }
            return out;
        };

        const fetchStatus = async () => {
            if (statusList.innerHTML === '') {
                loading.classList.remove('hidden');
                statusList.classList.add('hidden');
            }
            errorContainer.classList.add('hidden');

            refreshBtn.disabled = true;
            refreshBtn.classList.add('opacity-75', 'cursor-wait');

            try {
                const response = await fetch(`/api/status?window_hours=${currentWindowHours}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const payload = await response.json();
                const data = payload.items || [];
                if (payload.interval_ms) {
                    intervalSec = Math.max(1, Math.round(payload.interval_ms / 1000));
                }

                statusList.innerHTML = '';

                data.forEach(item => {
                    const endpointHistory = item.history || [];
                    const isOk = item.status === 'ok';
                    const badgeClass = isOk ? 'bg-green-100 text-green-800 border-green-200' : 'bg-red-100 text-red-800 border-red-200';
                    const dotClass = isOk ? 'bg-green-500' : 'bg-red-500';
                    const statusText = isOk ? 'OK' : 'Error';

                    const MAX_BARS = 60;
                    const buckets = bucketHistory(endpointHistory, MAX_BARS);
                    const historyHtml = buckets.map(b => {
                        const hColor = b.hasError ? 'bg-red-400' : 'bg-green-400';
                        return `<div class="w-1.5 h-4 sm:w-2 sm:h-5 rounded-sm ${hColor} opacity-80 hover:opacity-100 cursor-help transition-opacity" title="${b.tooltip}"></div>`;
                    }).join('');

                    const dbIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 mr-1 text-gray-500 flex-shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" /></svg>`;
                    const apiIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 mr-1 text-gray-500 flex-shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418" /></svg>`;
                    const iconHtml = item.name.includes('DB') ? dbIcon : apiIcon;

                    const card = document.createElement('div');
                    card.className = `bg-white rounded-xl shadow-sm border border-gray-100 p-4 sm:px-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:shadow-md transition-shadow duration-200 cursor-pointer`;
                    card.dataset.name = item.name;
                    card.addEventListener('click', () => openLogsModal(item.name));
                    
                    card.innerHTML = `
                        <div class="flex items-center gap-3 w-full sm:w-auto overflow-hidden">
                            <div class="flex items-center justify-center flex-shrink-0">
                                <span class="relative flex h-3 w-3">
                                  ${isOk ? '<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>' : ''}
                                  <span class="relative inline-flex rounded-full h-3 w-3 ${dotClass}"></span>
                                </span>
                            </div>
                            <div class="flex flex-col overflow-hidden">
                                <h2 class="text-sm font-semibold text-gray-700 truncate flex items-center" title="${item.name.toUpperCase()}">
                                    ${iconHtml}
                                    ${item.name.toUpperCase()}
                                </h2>
                                <div class="flex gap-1 mt-1.5 items-center">
                                    <span class="text-[10px] text-gray-400 mr-1 uppercase font-semibold tracking-wider">History:</span>
                                    ${historyHtml}
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-end">
                            <span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium border ${badgeClass}">
                                ${statusText}
                            </span>
                            <div class="flex items-center text-sm text-gray-500 font-mono bg-gray-50 px-2 py-1 rounded">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                ${item.time}
                            </div>
                        </div>
                    `;
                    statusList.appendChild(card);
                });

                statusList.classList.remove('hidden');
            } catch (err) {
                errorMessage.textContent = 'Failed to load system status. The server might be unreachable.';
                errorContainer.classList.remove('hidden');
                console.error('Error fetching status:', err);
            } finally {
                loading.classList.add('hidden');
                refreshBtn.disabled = false;
                refreshBtn.classList.remove('opacity-75', 'cursor-wait');
                resetTimer();
            }
        };

        const scheduleNext = () => {
            clearInterval(refreshInterval);
            refreshInterval = setInterval(fetchStatus, intervalSec * 1000);
        };

        refreshBtn.addEventListener('click', () => {
            fetchStatus().then(scheduleNext);
        });

        windowFilter.addEventListener('click', (e) => {
            const btn = e.target.closest('.window-btn');
            if (!btn) return;
            const hours = parseInt(btn.dataset.hours, 10);
            if (!hours || hours === currentWindowHours) return;
            currentWindowHours = hours;
            setActiveWindow(currentWindowHours);
            fetchStatus().then(scheduleNext);
        });

        fetchStatus().then(scheduleNext);

        // ----- Logs modal -----
        const logsModal       = document.getElementById('logsModal');
        const modalBackdrop   = document.getElementById('modalBackdrop');
        const modalClose      = document.getElementById('modalClose');
        const modalTitle      = document.getElementById('modalTitle');
        const modalSubtitle   = document.getElementById('modalSubtitle');
        const modalStats      = document.getElementById('modalStats');
        const modalChartWrap  = document.getElementById('modalChartWrap');
        const modalChart      = document.getElementById('modalChart');
        const modalChartMeta  = document.getElementById('modalChartMeta');
        const modalTable      = document.getElementById('modalTable');
        const modalTbody      = document.getElementById('modalTbody');
        const modalLoading    = document.getElementById('modalLoading');
        const modalEmpty     = document.getElementById('modalEmpty');
        const modalFooterNote = document.getElementById('modalFooterNote');
        const filterBar       = document.getElementById('filterBar');

        const LOG_PAGE_LIMIT = 500;
        let currentEndpoint = null;
        let currentRange = '24h';

        const setActiveFilter = (range) => {
            filterBar.querySelectorAll('.filter-btn').forEach(btn => {
                const active = btn.dataset.range === range;
                btn.classList.toggle('bg-blue-600', active);
                btn.classList.toggle('text-white', active);
                btn.classList.toggle('border-blue-600', active);
                btn.classList.toggle('text-gray-600', !active);
            });
        };

        const rangeToFromMs = (range) => {
            const now = Date.now();
            if (range === '24h') return now - 24 * 3600_000;
            const days = parseInt(range, 10);
            return now - days * 86400_000;
        };

        const fmtPercent = (v) => v === null || v === undefined ? '–' : (v * 100).toFixed(2) + '%';
        const fmtMs      = (v) => v === null || v === undefined ? '–' : v + 'ms';
        const fmtTime    = (ts) => {
            const d = new Date(ts);
            return d.toLocaleString();
        };

        const renderStats = (stats) => {
            modalStats.innerHTML = `
                <div><div class="text-gray-400 uppercase tracking-wider">Uptime</div><div class="text-gray-900 font-semibold text-sm mt-0.5">${fmtPercent(stats.uptime)}</div></div>
                <div><div class="text-gray-400 uppercase tracking-wider">Errors</div><div class="${stats.error > 0 ? 'text-red-600' : 'text-gray-900'} font-semibold text-sm mt-0.5">${stats.error.toLocaleString()}</div></div>
                <div><div class="text-gray-400 uppercase tracking-wider">Avg</div><div class="text-gray-900 font-semibold text-sm mt-0.5">${fmtMs(stats.avg_ms)}</div></div>
                <div><div class="text-gray-400 uppercase tracking-wider">Max</div><div class="text-gray-900 font-semibold text-sm mt-0.5">${fmtMs(stats.max_ms)}</div></div>
            `;
        };

        const renderRows = (items, total) => {
            modalTbody.innerHTML = items.map(row => {
                const isOk = row.status === 'ok';
                const badge = isOk
                    ? 'bg-green-100 text-green-700 border-green-200'
                    : 'bg-red-100 text-red-700 border-red-200';
                const detail = row.error
                    ? `<span class="text-red-600">${row.error}</span>`
                    : '<span class="text-gray-400">–</span>';
                return `
                    <tr class="border-t border-gray-100">
                        <td class="py-1.5 pr-2 text-gray-700 font-mono">${fmtTime(row.checked_at)}</td>
                        <td class="py-1.5 pr-2"><span class="inline-flex px-2 py-0.5 rounded border text-[10px] font-medium ${badge}">${isOk ? 'OK' : 'ERROR'}</span></td>
                        <td class="py-1.5 pr-2 text-gray-600 font-mono">${row.time}</td>
                        <td class="py-1.5 text-gray-600 truncate max-w-[260px]" title="${row.error || ''}">${detail}</td>
                    </tr>
                `;
            }).join('');
            if (total > items.length) {
                modalFooterNote.textContent = `Showing latest ${items.length.toLocaleString()} of ${total.toLocaleString()} records in this range.`;
                modalFooterNote.classList.remove('hidden');
            } else {
                modalFooterNote.classList.add('hidden');
            }
        };

        const CHART_MAX_BARS = 120;
        const renderChart = (items, total) => {
            if (!items || items.length === 0) {
                modalChartWrap.classList.add('hidden');
                return;
            }
            // items come DESC; chronological = reverse, then take last N
            const chrono = items.slice().reverse();
            const slice = chrono.slice(-CHART_MAX_BARS);
            modalChart.innerHTML = slice.map(row => {
                const isOk = row.status === 'ok';
                const color = isOk ? 'bg-green-400' : 'bg-red-400';
                const tooltip = `${fmtTime(row.checked_at)} • ${row.time} • ${(row.status || '').toUpperCase()}`;
                return `<div class="flex-1 min-w-[2px] h-full rounded-sm ${color} opacity-80 hover:opacity-100 cursor-help transition-opacity" title="${tooltip}"></div>`;
            }).join('');
            const shown = slice.length;
            const totalLabel = total ? total.toLocaleString() : shown.toLocaleString();
            modalChartMeta.textContent = total > shown
                ? `Last ${shown} of ${totalLabel}`
                : `${shown} check${shown === 1 ? '' : 's'}`;
            modalChartWrap.classList.remove('hidden');
        };

        const loadLogs = async () => {
            if (!currentEndpoint) return;
            const from = rangeToFromMs(currentRange);
            modalLoading.classList.remove('hidden');
            modalTable.classList.add('hidden');
            modalEmpty.classList.add('hidden');
            modalFooterNote.classList.add('hidden');
            modalStats.innerHTML = '';
            modalChart.innerHTML = '';
            modalChartWrap.classList.add('hidden');

            try {
                const qs = new URLSearchParams({ name: currentEndpoint, from: String(from) });
                const [statsRes, logsRes] = await Promise.all([
                    fetch(`/api/logs/stats?${qs.toString()}`).then(r => r.json()),
                    fetch(`/api/logs?${qs.toString()}&limit=${LOG_PAGE_LIMIT}`).then(r => r.json()),
                ]);
                renderStats(statsRes);
                const items = logsRes.items || [];
                if (items.length === 0) {
                    modalEmpty.classList.remove('hidden');
                } else {
                    renderChart(items, statsRes.total);
                    renderRows(items, statsRes.total);
                    modalTable.classList.remove('hidden');
                }
            } catch (err) {
                console.error('Failed to load logs:', err);
                modalEmpty.textContent = 'Failed to load logs.';
                modalEmpty.classList.remove('hidden');
            } finally {
                modalLoading.classList.add('hidden');
            }
        };

        const openLogsModal = (name) => {
            currentEndpoint = name;
            currentRange = '24h';
            modalTitle.textContent = name.toUpperCase();
            setActiveFilter(currentRange);
            logsModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            loadLogs();
        };

        const closeLogsModal = () => {
            logsModal.classList.add('hidden');
            document.body.style.overflow = '';
            currentEndpoint = null;
        };

        modalClose.addEventListener('click', closeLogsModal);
        modalBackdrop.addEventListener('click', closeLogsModal);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !logsModal.classList.contains('hidden')) closeLogsModal();
        });

        filterBar.addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            currentRange = btn.dataset.range;
            setActiveFilter(currentRange);
            loadLogs();
        });
    </script>
</body>
</html>
